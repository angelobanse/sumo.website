name: Deploy Hugo Site

on:
  push:
    branches:
      - source

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Branch
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'

    - name: Build Hugo Site
      run: hugo --minify

    - name: Debug Build Directory
      run: |
        echo "Listing root directory contents:"
        ls -l
        echo "Listing public directory contents:"
        if [ -d "public" ]; then
          ls -l public
        else
          echo "Error: public directory does not exist."
          exit 1
        fi

    - name: Create Temporary Backup
      run: |
        mkdir -p temp
        cp -r public/* temp/ || echo "No files to copy from public/."

    - name: Deploy to Main Branch
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
      run: |
        git checkout --orphan main
        git reset --hard
        git clean -df

        if [ -d "temp" ] && [ "$(ls -A temp)" ]; then
          cp -r temp/* .
          rm -rf temp
        else
          echo "Error: No files to deploy."
          exit 1
        fi

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git add .
        git commit -m "Deploy from source branch"
        git push --force origin main
