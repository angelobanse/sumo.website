name: Deploy Hugo Site (Incremental Updates)

on:
  push:
    branches:
      - source

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Branch
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: true # Include themes if needed

    - name: Install Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'

    - name: Build Hugo Site
      run: |
        hugo --minify
        if [ ! -d "public" ] || [ -z "$(ls -A public)" ]; then
          echo "Error: Hugo did not generate any files."
          exit 1
        fi

    - name: Checkout Main Branch
      run: |
        # Fetch and checkout the main branch
        git fetch origin main
        git checkout main || git checkout --orphan main

    - name: Copy New Files
      run: |
        # Copy new files from public/ to the repository root
        rsync -av --delete --exclude='.hugo_build.lock' public/ .

    - name: Commit and Push Changes
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Check for changes and commit if necessary
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "Deploy updates from source branch"
          git push origin main
        else
          echo "No changes to commit."
        fi
