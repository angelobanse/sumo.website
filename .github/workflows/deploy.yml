name: Deploy Hugo Site

on:
  push:
    branches:
      - source

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Branch
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: true # Include themes if needed

    - name: Install Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'

    - name: Build Hugo Site
      run: |
        hugo --minify
        if [ ! -d "public" ] || [ -z "$(ls -A public)" ]; then
          echo "Error: Hugo did not generate any files."
          exit 1
        fi

    - name: Backup Generated Files
      run: |
        mkdir -p temp
        cp -r public/* temp/

    - name: Deploy to Main Branch
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
      run: |
        # Switch to main branch
        git checkout --orphan main

        # Clean up and reset branch
        git reset --hard
        git clean -df

        # Move files back to root
        cp -r temp/* .
        rm -rf temp

        # Configure Git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Commit and push changes
        git add .
        git commit -m "Deploy from source branch"
        git push --force origin main
