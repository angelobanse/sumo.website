name: Deploy Hugo Site

on:
  push:
    branches:
      - source

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Branch
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'

    - name: Build Hugo Site
      run: hugo --minify

    - name: Debug Directory After Build
      run: ls -R

    - name: Create Temporary Backup
      run: |
        mkdir -p temp
        if [ -d "public" ]; then
          cp -r public/* temp/
        else
          echo "Error: public directory does not exist."
          exit 1
        fi

    - name: Deploy to Main Branch
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
      run: |
        # Switch to a clean branch
        git checkout --orphan main
        git reset --hard
        git clean -df

        # Move files from temp to the root
        if [ -d "temp" ]; then
          cp -r temp/* .
          rm -rf temp
        else
          echo "Error: temp directory does not exist."
          exit 1
        fi

        # Git configuration
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Commit and push changes
        git add .
        git commit -m "Deploy from source branch"
        git push --force origin main
